apiVersion: litmuschaos.io/v1alpha1
kind: ChaosEngine
metadata:
  name: redis-failure
  namespace: atlas-infra
spec:
  appinfo:
    appns: atlas-infra
    applabel: app=redis
    appkind: deployment
  chaosServiceAccount: litmus-admin
  experiments:
    - name: pod-delete
      spec:
        components:
          env:
            - name: TOTAL_CHAOS_DURATION
              value: "60"
            - name: FORCE
              value: "false"
        probe:
          - name: gateway-still-responds
            type: httpProbe
            httpProbe/inputs:
              url: http://api-gateway.atlas-gateway:8080/health
              method:
                get:
                  criteria: ==
                  responseCode: "200"
            mode: Continuous
            runProperties:
              probeTimeout: 5
              interval: 5
              retry: 3
