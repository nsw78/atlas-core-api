  security-certification:
    build:
      context: ./services/security-certification
      dockerfile: Dockerfile
    container_name: atlas-security-certification
    ports:
      - "8110:8000"
    environment:
      DATABASE_URL: postgres://atlas:${POSTGRES_PASSWORD:-atlas_dev}@postgres:5432/atlas?sslmode=disable
      REDIS_URL: redis://redis:6379/6
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    networks:
      - atlas-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M
    restart: unless-stopped

  continuous-improvement:
    build:
      context: ./services/continuous-improvement
      dockerfile: Dockerfile
    container_name: atlas-continuous-improvement
    ports:
      - "8111:8000"
    environment:
      DATABASE_URL: postgres://atlas:${POSTGRES_PASSWORD:-atlas_dev}@postgres:5432/atlas?sslmode=disable
      REDIS_URL: redis://redis:6379/7
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    networks:
      - atlas-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M
    restart: unless-stopped

  # ===========================================
  # OBSERVABILITY STACK
  # ===========================================
  prometheus:
    image: prom/prometheus:v2.49.1
    container_name: atlas-prometheus
    ports:
      - "9091:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
      - "--web.enable-lifecycle"
    networks:
      - atlas-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.2.3
    container_name: atlas-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: "http://localhost:3001"
    volumes:
      - ./monitoring/grafana/provisioning/datasources/datasource.yml:/etc/grafana/provisioning/datasources/datasource.yml:ro
      - ./monitoring/grafana/provisioning/dashboards/dashboard.yml:/etc/grafana/provisioning/dashboards/dashboard.yml:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_healthy
    networks:
      - atlas-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    restart: unless-stopped

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: atlas-postgres-exporter
    ports:
      - "9187:9187"
    environment:
      DATA_SOURCE_NAME: "postgresql://atlas:${POSTGRES_PASSWORD:-atlas_dev}@postgres:5432/atlas?sslmode=disable"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - atlas-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9187/metrics"]
      interval: 15s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 32M
    restart: unless-stopped

  redis-exporter:
    image: oliver006/redis_exporter:v1.56.0
    container_name: atlas-redis-exporter
    ports:
      - "9121:9121"
    environment:
      REDIS_ADDR: "redis://redis:6379"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - atlas-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9121/metrics"]
      interval: 15s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 32M
    restart: unless-stopped

  # ===========================================
  # GRAPHQL GATEWAY - Node.js
  # ===========================================
  graphql-gateway:
    build:
      context: ./services/graphql-gateway
      dockerfile: Dockerfile
    container_name: atlas-graphql-gateway
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: ${ENVIRONMENT:-development}
      PORT: 4000
      DATABASE_URL: postgres://atlas:${POSTGRES_PASSWORD:-atlas_dev}@postgres:5432/atlas?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      API_GATEWAY_URL: http://api-gateway:8080
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      api-gateway: { condition: service_healthy }
    networks:
      - atlas-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    restart: unless-stopped

  # ===========================================
  # FRONTEND
  # ===========================================
  frontend:
    build:
      context: ./services/frontend
      dockerfile: Dockerfile
    container_name: atlas-frontend
    ports:
      - "3004:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080
    depends_on:
      api-gateway:
        condition: service_healthy
    networks:
      - atlas-network
    deploy:
      resources:
        limits:
          memory: 512M
    restart: unless-stopped

# ===========================================
# GLOBAL DEFINITIONS
# ===========================================
networks:
  atlas-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  postgres_data:
  postgis_data:
  redis_data:
  prometheus_data:
  grafana_data:
