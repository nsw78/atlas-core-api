    ports:
      - "8107:8000"
    environment:
      DATABASE_URL: postgres://atlas:${POSTGRES_PASSWORD:-atlas_dev}@postgres:5432/atlas?sslmode=disable
      REDIS_URL: redis://redis:6379/3
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    networks:
      - atlas-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M
    restart: unless-stopped

  # ===========================================
  # PYTHON SERVICES - Operations & Optimization
  # ===========================================
  cost-optimization:
    build:
      context: ./services/cost-optimization
      dockerfile: Dockerfile
    container_name: atlas-cost-optimization
    ports:
      - "8108:8000"
    environment:
      DATABASE_URL: postgres://atlas:${POSTGRES_PASSWORD:-atlas_dev}@postgres:5432/atlas?sslmode=disable
      REDIS_URL: redis://redis:6379/4
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    networks:
      - atlas-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M
    restart: unless-stopped

  performance-optimization:
    build:
      context: ./services/performance-optimization
      dockerfile: Dockerfile
    container_name: atlas-performance-optimization
    ports:
      - "8109:8000"
    environment:
      DATABASE_URL: postgres://atlas:${POSTGRES_PASSWORD:-atlas_dev}@postgres:5432/atlas?sslmode=disable
      REDIS_URL: redis://redis:6379/5
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    networks:
      - atlas-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M
