services:
  # ===========================================
  # INFRASTRUCTURE - Databases
  # ===========================================
  postgres:
    image: postgres:15-alpine
    container_name: atlas-postgres
    environment:
      POSTGRES_DB: atlas
      POSTGRES_USER: atlas
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-atlas_dev}
    ports:
      - "5437:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
      - ./backups:/backups
    networks:
      - atlas-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atlas -d atlas"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M
    command: >
      postgres
      -c shared_buffers=512MB
      -c max_connections=500
      -c synchronous_commit=off
      -c effective_cache_size=2GB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
      -c default_statistics_target=100
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
      -c log_min_duration_statement=1000
      -c log_checkpoints=on
      -c log_connections=on
      -c log_disconnections=on

  postgis:
    image: postgis/postgis:15-3.3-alpine
    container_name: atlas-postgis
    environment:
      POSTGRES_DB: atlas_geo
      POSTGRES_USER: atlas
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-atlas_dev}
    ports:
      - "5438:5432"
    volumes:
      - postgis_data:/var/lib/postgresql/data
      - ./backups:/backups
    networks:
      - atlas-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atlas -d atlas_geo"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M
    command: >
      postgres
      -c shared_buffers=512MB
      -c max_connections=500
      -c synchronous_commit=off
      -c effective_cache_size=2GB

  redis:
    image: redis:7-alpine
    container_name: atlas-redis
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --tcp-keepalive 60
      --timeout 300
      --hz 10
    ports:
      - "6392:6379"
    volumes:
      - redis_data:/data
    networks:
      - atlas-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M

  # ===========================================
  # INFRASTRUCTURE - Message Queue
  # ===========================================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: atlas-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - atlas-network
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 3

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: atlas-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9093:9093"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_RETENTION_BYTES: 1073741824
      KAFKA_NUM_PARTITIONS: 3
    networks:
      - atlas-network
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:29092"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 40s

  # ===========================================
  # CORE SERVICES - Go (Enterprise Config)
  # ===========================================
  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    container_name: atlas-api-gateway
    ports:
      - "8080:8080"
      - "9090:9090"
    environment:
      # Server
      SERVER_PORT: 8080
      ENVIRONMENT: ${ENVIRONMENT:-development}
      SERVER_READ_TIMEOUT: 30s
      SERVER_WRITE_TIMEOUT: 30s
      SERVER_IDLE_TIMEOUT: 120s
      SERVER_SHUTDOWN_TIMEOUT: 30s
      SERVER_GRACEFUL_SHUTDOWN: "true"
      # Auth
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      JWT_EXPIRATION: 15m
      REFRESH_TOKEN_EXPIRATION: 168h
      MAX_LOGIN_ATTEMPTS: 5
      LOCKOUT_DURATION: 15m
      # Cache
      CACHE_TYPE: redis
      REDIS_URL: redis://redis:6379/0
      CACHE_TTL: 1h
      # Database
      DATABASE_URL: postgres://atlas:${POSTGRES_PASSWORD:-atlas_dev}@postgres:5432/atlas?sslmode=disable
      # CORS
      CORS_ENABLED: "true"
      CORS_ALLOWED_ORIGINS: http://localhost:3004,https://localhost:3004
      # Rate Limiting
      RATE_LIMIT_ENABLED: "true"
      RATE_LIMIT_RPS: 100
      RATE_LIMIT_BURST: 50
      # Observability
      METRICS_ENABLED: "true"
      METRICS_PORT: 9090
      TRACING_ENABLED: "false"
      LOG_LEVEL: info
    depends_on:
      redis: { condition: service_healthy }
      postgres: { condition: service_healthy }
    networks:
      - atlas-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 128M
          cpus: "0.25"
    restart: unless-stopped

  iam-service:
    build:
