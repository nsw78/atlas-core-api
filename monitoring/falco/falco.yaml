rules_file:
  - /etc/falco/falco_rules.yaml
  - /etc/falco/falco_rules.local.yaml
json_output: true
json_include_output_property: true
log_stderr: true
log_syslog: false
log_level: info
priority: warning
buffered_outputs: false
outputs:
  rate: 1
  max_burst: 1000
stdout_output:
  enabled: true
program_output:
  enabled: true
  keep_alive: false
  program: |
    /usr/bin/curl -s -X POST http://kafka.atlas-infra:8082/topics/atlas.security.falco \
      -H "Content-Type: application/vnd.kafka.json.v2+json" \
      -d "{\"records\":[{\"value\":$(cat)}]}"
http_output:
  enabled: true
  url: http://api-gateway.atlas-gateway:8080/api/v1/audit/security-events
grpc_output:
  enabled: false
