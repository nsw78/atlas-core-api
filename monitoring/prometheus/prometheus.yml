global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s
  external_labels:
    cluster: atlas-core
    environment: production

# =============================================
# Alerting Configuration
# =============================================
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093
      timeout: 10s

# =============================================
# Alert Rules
# =============================================
rule_files:
  - "alert_rules.yml"

# =============================================
# Scrape Configurations
# =============================================
scrape_configs:
  # -------------------------------------------
  # Prometheus Self-Monitoring
  # -------------------------------------------
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # -------------------------------------------
  # Core Platform Services - Go
  # -------------------------------------------
  - job_name: "api-gateway"
    metrics_path: /metrics
    static_configs:
      - targets: ["atlas-api-gateway:9090"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "api-gateway"

  # -------------------------------------------
  # Python Services (FastAPI via prometheus-client on :8000/metrics)
  # -------------------------------------------
  - job_name: "sanctions-screening"
    metrics_path: /metrics
    static_configs:
      - targets: ["atlas-sanctions-screening:8000"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
