{{- $services := list "api-gateway" "graphql-gateway" "iam-service" "risk-assessment" "sanctions-screening" "graph-intelligence" "model-serving" "audit-logging" "news-aggregator" "frontend" }}
{{- $nsMap := dict "api-gateway" $.Values.namespaces.gateway "graphql-gateway" $.Values.namespaces.gateway "frontend" $.Values.namespaces.gateway "iam-service" $.Values.namespaces.core "sanctions-screening" $.Values.namespaces.core "audit-logging" $.Values.namespaces.core "risk-assessment" $.Values.namespaces.intel "graph-intelligence" $.Values.namespaces.intel "news-aggregator" $.Values.namespaces.intel "model-serving" $.Values.namespaces.ml }}
{{- range $svc := $services }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $svc }}
  namespace: {{ index $nsMap $svc }}
  labels:
    {{- include "atlas-core.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $svc }}
{{- end }}
