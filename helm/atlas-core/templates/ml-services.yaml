{{/*
Model Serving
*/}}
{{- $ml := .Values.modelServing -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: model-serving
  namespace: {{ .Values.namespaces.ml }}
  labels:
    {{- include "atlas-core.labels" . | nindent 4 }}
    app.kubernetes.io/component: model-serving
spec:
  replicas: {{ $ml.replicaCount }}
  selector:
    matchLabels:
      app: model-serving
  template:
    metadata:
      labels:
        app: model-serving
    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: model-serving
      containers:
        - name: model-serving
          image: {{ include "atlas-core.image" (dict "global" .Values.global "service" $ml) }}
          ports:
            - name: http
              containerPort: {{ $ml.service.port }}
            - name: metrics
              containerPort: 9090
          env:
            - name: ENVIRONMENT
              value: {{ .Values.global.environment }}
            - name: REDIS_URL
              value: {{ include "atlas-core.redisUrl" . }}
            - name: MLFLOW_TRACKING_URI
              value: http://mlflow.{{ .Values.namespaces.ml }}.svc:5000
          resources:
            {{- toYaml $ml.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          volumeMounts:
            - name: model-cache
              mountPath: /models
      volumes:
        - name: model-cache
          emptyDir:
            sizeLimit: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: model-serving
  namespace: {{ .Values.namespaces.ml }}
spec:
  ports:
    - port: {{ $ml.service.port }}
      targetPort: http
      name: http
    - port: 9090
      targetPort: metrics
      name: metrics
  selector:
    app: model-serving
---
{{- if $ml.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: model-serving
  namespace: {{ .Values.namespaces.ml }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: model-serving
  minReplicas: {{ $ml.autoscaling.minReplicas }}
  maxReplicas: {{ $ml.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ $ml.autoscaling.targetCPUUtilization }}
{{- end }}
