{{/*
Risk Assessment
*/}}
{{- $risk := .Values.riskAssessment -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: risk-assessment
  namespace: {{ .Values.namespaces.intel }}
  labels:
    {{- include "atlas-core.labels" . | nindent 4 }}
    app.kubernetes.io/component: risk-assessment
spec:
  replicas: {{ $risk.replicaCount }}
  selector:
    matchLabels:
      app: risk-assessment
  template:
    metadata:
      labels:
        app: risk-assessment
    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: risk-assessment
      containers:
        - name: risk-assessment
          image: {{ include "atlas-core.image" (dict "global" .Values.global "service" $risk) }}
          ports:
            - name: http
              containerPort: {{ $risk.service.port }}
            - name: metrics
              containerPort: 9090
          env:
            - name: ENVIRONMENT
              value: {{ .Values.global.environment }}
            - name: DATABASE_URL
              value: {{ include "atlas-core.databaseUrl" . }}
            - name: REDIS_URL
              value: {{ include "atlas-core.redisUrl" . }}
            - name: KAFKA_BROKERS
              value: {{ include "atlas-core.kafkaBrokers" . }}
          resources:
            {{- toYaml $risk.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: risk-assessment
  namespace: {{ .Values.namespaces.intel }}
spec:
  ports:
    - port: {{ $risk.service.port }}
      targetPort: http
      name: http
    - port: 9090
      targetPort: metrics
      name: metrics
  selector:
    app: risk-assessment
---
{{- if $risk.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: risk-assessment
  namespace: {{ .Values.namespaces.intel }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: risk-assessment
  minReplicas: {{ $risk.autoscaling.minReplicas }}
  maxReplicas: {{ $risk.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ $risk.autoscaling.targetCPUUtilization }}
{{- end }}
---
{{- if $risk.pdb }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: risk-assessment
  namespace: {{ .Values.namespaces.intel }}
spec:
  minAvailable: {{ $risk.pdb.minAvailable }}
  selector:
    matchLabels:
      app: risk-assessment
{{- end }}
---
