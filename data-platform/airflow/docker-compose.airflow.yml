###############################################################################
# ATLAS Core API - Apache Airflow Docker Compose
#
# LocalExecutor with PostgreSQL metadata backend, Redis broker,
# and webserver exposed on port 8082.
###############################################################################

x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: Dockerfile
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY:-}
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DEFAULT_TIMEZONE: "utc"
    AIRFLOW__CORE__MAX_ACTIVE_RUNS_PER_DAG: 1
    AIRFLOW__CORE__PARALLELISM: 32
    AIRFLOW__CORE__DAG_CONCURRENCY: 16

    # Database
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:${AIRFLOW_DB_PASSWORD:-airflow}@airflow-postgres:5432/airflow

    # Webserver
    AIRFLOW__WEBSERVER__BASE_URL: http://localhost:8082
    AIRFLOW__WEBSERVER__WEB_SERVER_PORT: 8082
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY:-atlas-airflow-secret-key}
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "false"
    AIRFLOW__WEBSERVER__ENABLE_PROXY_FIX: "true"
    AIRFLOW__WEBSERVER__WORKERS: 2

    # Scheduler
    AIRFLOW__SCHEDULER__MIN_FILE_PROCESS_INTERVAL: 30
    AIRFLOW__SCHEDULER__DAG_DIR_LIST_INTERVAL: 60
    AIRFLOW__SCHEDULER__CATCHUP_BY_DEFAULT: "false"

    # Celery / Redis (used as broker for event-driven patterns)
    AIRFLOW__CELERY__BROKER_URL: redis://:${REDIS_PASSWORD:-atlas_redis}@airflow-redis:6379/0
    AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://airflow:${AIRFLOW_DB_PASSWORD:-airflow}@airflow-postgres:5432/airflow

    # Email
    AIRFLOW__EMAIL__EMAIL_BACKEND: airflow.utils.email.send_email_smtp
    AIRFLOW__SMTP__SMTP_HOST: ${SMTP_HOST:-smtp.sendgrid.net}
    AIRFLOW__SMTP__SMTP_PORT: ${SMTP_PORT:-587}
    AIRFLOW__SMTP__SMTP_USER: ${SMTP_USER:-apikey}
    AIRFLOW__SMTP__SMTP_PASSWORD: ${SMTP_PASSWORD:-}
    AIRFLOW__SMTP__SMTP_MAIL_FROM: ${SMTP_MAIL_FROM:-airflow@atlas-core.io}
    AIRFLOW__SMTP__SMTP_STARTTLS: "true"

    # Logging
    AIRFLOW__LOGGING__REMOTE_LOGGING: "true"
    AIRFLOW__LOGGING__REMOTE_LOG_CONN_ID: atlas_s3
    AIRFLOW__LOGGING__REMOTE_BASE_LOG_FOLDER: s3://atlas-airflow-logs/logs
    AIRFLOW__LOGGING__LOGGING_LEVEL: INFO

    # Metrics
    AIRFLOW__METRICS__STATSD_ON: "true"
    AIRFLOW__METRICS__STATSD_HOST: statsd-exporter
    AIRFLOW__METRICS__STATSD_PORT: 9125
    AIRFLOW__METRICS__STATSD_PREFIX: airflow

    # API
    AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.session,airflow.api.auth.backend.basic_auth

  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins
    - ./config:/opt/airflow/config
  depends_on:
    airflow-postgres:
      condition: service_healthy
    airflow-redis:
      condition: service_healthy
  networks:
    - atlas-network

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL - Airflow metadata database
  # ---------------------------------------------------------------------------
  airflow-postgres:
    image: postgres:16-alpine
    container_name: atlas-airflow-postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: ${AIRFLOW_DB_PASSWORD:-airflow}
      POSTGRES_DB: airflow
    ports:
      - "5433:5432"
    volumes:
      - airflow-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - atlas-network

  # ---------------------------------------------------------------------------
  # Redis - Broker / cache
  # ---------------------------------------------------------------------------
  airflow-redis:
    image: redis:7-alpine
    container_name: atlas-airflow-redis
    command: >
      redis-server
        --requirepass ${REDIS_PASSWORD:-atlas_redis}
        --maxmemory 512mb
        --maxmemory-policy allkeys-lru
    ports:
      - "6380:6379"
    volumes:
      - airflow-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-atlas_redis}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - atlas-network

  # ---------------------------------------------------------------------------
  # Airflow Init (one-shot: DB migrate + create admin user)
  # ---------------------------------------------------------------------------
  airflow-init:
    <<: *airflow-common
    container_name: atlas-airflow-init
    entrypoint: /bin/bash
    command: >
      -c "
        airflow db migrate &&
        airflow users create
          --username admin
          --firstname Atlas
          --lastname Admin
          --role Admin
          --email admin@atlas-core.io
          --password $${AIRFLOW_ADMIN_PASSWORD:-admin}
      "
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_MIGRATE: "true"
      _AIRFLOW_WWW_USER_CREATE: "true"
    restart: "no"

  # ---------------------------------------------------------------------------
  # Webserver
  # ---------------------------------------------------------------------------
  airflow-webserver:
    <<: *airflow-common
    container_name: atlas-airflow-webserver
    command: airflow webserver
    ports:
      - "8082:8082"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8082/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ---------------------------------------------------------------------------
  # Scheduler
  # ---------------------------------------------------------------------------
  airflow-scheduler:
    <<: *airflow-common
    container_name: atlas-airflow-scheduler
    command: airflow scheduler
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type SchedulerJob --hostname $(hostname) || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ---------------------------------------------------------------------------
  # Triggerer (for deferrable operators)
  # ---------------------------------------------------------------------------
  airflow-triggerer:
    <<: *airflow-common
    container_name: atlas-airflow-triggerer
    command: airflow triggerer
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type TriggererJob --hostname $(hostname) || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully

volumes:
  airflow-postgres-data:
    driver: local
  airflow-redis-data:
    driver: local

networks:
  atlas-network:
    external: true
