<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E3A5F"/>
      <stop offset="50%" style="stop-color:#0F2744"/>
      <stop offset="100%" style="stop-color:#0A1929"/>
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6"/>
      <stop offset="100%" style="stop-color:#06B6D4"/>
    </linearGradient>
    <linearGradient id="inner" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60A5FA"/>
      <stop offset="100%" style="stop-color:#22D3EE"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Outer orbit ring -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="url(#ring)" stroke-width="3" opacity="0.25"/>
  <!-- Globe main circle -->
  <circle cx="256" cy="256" r="140" fill="none" stroke="url(#ring)" stroke-width="10" filter="url(#glow)"/>
  <!-- Latitude lines -->
  <ellipse cx="256" cy="256" rx="140" ry="55" fill="none" stroke="#3B82F6" stroke-width="4" opacity="0.4"/>
  <ellipse cx="256" cy="256" rx="140" ry="100" fill="none" stroke="#3B82F6" stroke-width="3" opacity="0.25"/>
  <!-- Longitude lines -->
  <ellipse cx="256" cy="256" rx="55" ry="140" fill="none" stroke="#3B82F6" stroke-width="4" opacity="0.4"/>
  <ellipse cx="256" cy="256" rx="100" ry="140" fill="none" stroke="#3B82F6" stroke-width="3" opacity="0.25"/>
  <!-- Crosshair -->
  <line x1="256" y1="100" x2="256" y2="412" stroke="#06B6D4" stroke-width="2" opacity="0.2"/>
  <line x1="100" y1="256" x2="412" y2="256" stroke="#06B6D4" stroke-width="2" opacity="0.2"/>
  <!-- Scanning arc -->
  <path d="M 256 116 A 140 140 0 0 1 396 256" fill="none" stroke="url(#inner)" stroke-width="6" stroke-linecap="round" opacity="0.7"/>
  <!-- Data node points on the globe -->
  <circle cx="200" cy="200" r="6" fill="#3B82F6" opacity="0.8"/>
  <circle cx="310" cy="190" r="5" fill="#06B6D4" opacity="0.7"/>
  <circle cx="280" cy="310" r="7" fill="#3B82F6" opacity="0.9"/>
  <circle cx="180" cy="290" r="4" fill="#06B6D4" opacity="0.6"/>
  <circle cx="330" cy="260" r="5" fill="#60A5FA" opacity="0.7"/>
  <!-- Connection lines between nodes -->
  <line x1="200" y1="200" x2="310" y2="190" stroke="#3B82F6" stroke-width="1.5" opacity="0.3"/>
  <line x1="310" y1="190" x2="330" y2="260" stroke="#06B6D4" stroke-width="1.5" opacity="0.3"/>
  <line x1="330" y1="260" x2="280" y2="310" stroke="#3B82F6" stroke-width="1.5" opacity="0.3"/>
  <line x1="280" y1="310" x2="180" y2="290" stroke="#06B6D4" stroke-width="1.5" opacity="0.3"/>
  <line x1="180" y1="290" x2="200" y2="200" stroke="#3B82F6" stroke-width="1.5" opacity="0.3"/>
  <!-- Center target dot -->
  <circle cx="256" cy="256" r="12" fill="url(#inner)" opacity="0.9" filter="url(#glow)"/>
  <circle cx="256" cy="256" r="4" fill="#FFFFFF"/>
  <!-- API label -->
  <rect x="186" y="430" width="140" height="36" rx="18" fill="url(#ring)" opacity="0.15"/>
  <text x="256" y="455" font-family="system-ui,-apple-system,sans-serif" font-size="24" font-weight="700" fill="url(#inner)" text-anchor="middle" letter-spacing="8">API</text>
</svg>
