[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["integration", "e2e"]
markers = [
    "integration: marks tests that call a live service (may require running containers)",
    "e2e: marks end-to-end tests that span multiple services",
    "unit: marks pure unit tests with no external dependencies",
]
filterwarnings = [
    "ignore::DeprecationWarning",
]
