<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6"/>
      <stop offset="100%" style="stop-color:#06B6D4"/>
    </linearGradient>
    <linearGradient id="globe" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.95"/>
      <stop offset="100%" style="stop-color:#E0F2FE;stop-opacity:0.85"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Globe circle -->
  <circle cx="256" cy="240" r="130" fill="none" stroke="url(#globe)" stroke-width="12"/>
  <!-- Latitude lines -->
  <ellipse cx="256" cy="240" rx="130" ry="50" fill="none" stroke="url(#globe)" stroke-width="6" opacity="0.6"/>
  <ellipse cx="256" cy="240" rx="130" ry="95" fill="none" stroke="url(#globe)" stroke-width="6" opacity="0.4"/>
  <!-- Longitude line (vertical) -->
  <ellipse cx="256" cy="240" rx="50" ry="130" fill="none" stroke="url(#globe)" stroke-width="6" opacity="0.6"/>
  <!-- Crosshair / target reticle -->
  <line x1="256" y1="150" x2="256" y2="330" stroke="#FFFFFF" stroke-width="4" opacity="0.35"/>
  <line x1="166" y1="240" x2="346" y2="240" stroke="#FFFFFF" stroke-width="4" opacity="0.35"/>
  <!-- Center dot -->
  <circle cx="256" cy="240" r="8" fill="#FFFFFF" opacity="0.9"/>
  <!-- ATLAS text -->
  <text x="256" y="420" font-family="system-ui,-apple-system,sans-serif" font-size="72" font-weight="700" fill="#FFFFFF" text-anchor="middle" letter-spacing="12">ATLAS</text>
</svg>
