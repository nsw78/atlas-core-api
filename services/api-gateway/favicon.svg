<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E3A5F"/>
      <stop offset="100%" style="stop-color:#0A1929"/>
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6"/>
      <stop offset="100%" style="stop-color:#06B6D4"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="6" fill="url(#bg)"/>
  <!-- Globe -->
  <circle cx="16" cy="16" r="10" fill="none" stroke="url(#ring)" stroke-width="1.5"/>
  <!-- Latitude -->
  <ellipse cx="16" cy="16" rx="10" ry="4" fill="none" stroke="#3B82F6" stroke-width="0.8" opacity="0.5"/>
  <!-- Longitude -->
  <ellipse cx="16" cy="16" rx="4" ry="10" fill="none" stroke="#3B82F6" stroke-width="0.8" opacity="0.5"/>
  <!-- Crosshair -->
  <line x1="16" y1="5" x2="16" y2="27" stroke="#06B6D4" stroke-width="0.5" opacity="0.3"/>
  <line x1="5" y1="16" x2="27" y2="16" stroke="#06B6D4" stroke-width="0.5" opacity="0.3"/>
  <!-- Data nodes -->
  <circle cx="12" cy="12" r="1.2" fill="#3B82F6" opacity="0.9"/>
  <circle cx="20" cy="13" r="1" fill="#06B6D4" opacity="0.8"/>
  <circle cx="18" cy="20" r="1.3" fill="#3B82F6" opacity="0.9"/>
  <circle cx="11" cy="19" r="0.9" fill="#06B6D4" opacity="0.7"/>
  <!-- Connection lines -->
  <line x1="12" y1="12" x2="20" y2="13" stroke="#3B82F6" stroke-width="0.5" opacity="0.4"/>
  <line x1="20" y1="13" x2="18" y2="20" stroke="#06B6D4" stroke-width="0.5" opacity="0.4"/>
  <line x1="18" y1="20" x2="11" y2="19" stroke="#3B82F6" stroke-width="0.5" opacity="0.4"/>
  <line x1="11" y1="19" x2="12" y2="12" stroke="#06B6D4" stroke-width="0.5" opacity="0.4"/>
  <!-- Center dot -->
  <circle cx="16" cy="16" r="1.8" fill="#06B6D4" opacity="0.9"/>
  <circle cx="16" cy="16" r="0.7" fill="#FFFFFF"/>
</svg>
