# ============================================================
# ISTIO Virtual Services - Traffic management & canary
# ============================================================

# API Gateway - Canary deployment support
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: api-gateway-vs
  namespace: atlas-gateway
spec:
  hosts:
    - api-gateway
  http:
    - route:
        - destination:
            host: api-gateway
            subset: stable
          weight: 95
        - destination:
            host: api-gateway
            subset: canary
          weight: 5
      timeout: 30s
      retries:
        attempts: 3
        perTryTimeout: 10s
        retryOn: "5xx,reset,connect-failure,resource-exhausted"
      fault:
        abort:
          percentage:
            value: 0
          httpStatus: 503
---
# Risk Assessment - With retries and timeout
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
