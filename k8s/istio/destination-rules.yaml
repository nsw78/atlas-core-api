# ============================================================
# ISTIO Destination Rules - Circuit breaking & load balancing
# ============================================================

# API Gateway
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: api-gateway-dr
  namespace: atlas-gateway
spec:
  host: api-gateway
  trafficPolicy:
    connectionPool:
      http:
        h2UpgradePolicy: DEFAULT
        maxRequestsPerConnection: 100
        maxRetries: 3
      tcp:
        maxConnections: 1000
        connectTimeout: 10s
    outlierDetection:
      consecutive5xxErrors: 5
      interval: 30s
      baseEjectionTime: 60s
      maxEjectionPercent: 30
    loadBalancer:
      simple: LEAST_REQUEST
  subsets:
    - name: stable
      labels:
        version: stable
    - name: canary
      labels:
        version: canary
---
# IAM Service
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: iam-service-dr
  namespace: atlas-core
spec:
  host: iam-service
  trafficPolicy:
    connectionPool:
      http:
        maxRequestsPerConnection: 50
      tcp:
        maxConnections: 500
        connectTimeout: 5s
    outlierDetection:
      consecutive5xxErrors: 3
      interval: 15s
      baseEjectionTime: 30s
      maxEjectionPercent: 20
    loadBalancer:
      simple: ROUND_ROBIN
  subsets:
    - name: stable
      labels:
        version: stable
