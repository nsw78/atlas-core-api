# --- Remaining Services (Mobile, Cost, Performance, Security, R&D, Continuous Improvement) ---

# Mobile API
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mobile-api
  namespace: atlas-core
  labels:
    app: mobile-api
    tier: core
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mobile-api
  template:
    metadata:
      labels:
        app: mobile-api
        tier: core
      annotations:
        sidecar.istio.io/inject: "true"
    spec:
      containers:
        - name: mobile-api
          image: atlas/mobile-api:latest
          ports:
            - containerPort: 8100
              name: http
          env:
            - name: PORT
              value: "8100"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: redis-secret
                  key: url
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8100
            initialDelaySeconds: 20
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8100
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: mobile-api
  namespace: atlas-core
spec:
  selector:
    app: mobile-api
  ports:
    - name: http
      port: 8100
      targetPort: 8100
