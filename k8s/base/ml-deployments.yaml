# ============================================================
# ATLAS ML NAMESPACE - ML Infra, Model Serving, Monitoring, XAI, Federated
# ============================================================

# --- ML Infrastructure ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ml-infrastructure
  namespace: atlas-ml
  labels:
    app: ml-infrastructure
    tier: ml
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ml-infrastructure
  template:
    metadata:
      labels:
        app: ml-infrastructure
        tier: ml
      annotations:
        sidecar.istio.io/inject: "true"
        prometheus.io/scrape: "true"
        prometheus.io/port: "8087"
    spec:
      containers:
        - name: ml-infrastructure
          image: atlas/ml-infrastructure:latest
          ports:
            - containerPort: 8087
              name: http
          env:
            - name: PORT
              value: "8087"
            - name: KAFKA_BROKERS
              valueFrom:
                configMapKeyRef:
                  name: atlas-common-config
                  key: KAFKA_BROKERS
            - name: MLFLOW_TRACKING_URI
              value: "http://mlflow.atlas-ml:5000"
            - name: FEATURE_STORE_URL
              value: "http://feast.atlas-ml:6566"
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 4Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 8087
            initialDelaySeconds: 60
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8087
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: ml-infrastructure
  namespace: atlas-ml
spec:
  selector:
    app: ml-infrastructure
  ports:
    - name: http
      port: 8087
      targetPort: 8087
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ml-infrastructure-hpa
  namespace: atlas-ml
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ml-infrastructure
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65
---
# --- Model Serving ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: model-serving
  namespace: atlas-ml
  labels:
    app: model-serving
    tier: ml
spec:
  replicas: 3
  selector:
    matchLabels:
      app: model-serving
  template:
    metadata:
      labels:
        app: model-serving
        tier: ml
      annotations:
        sidecar.istio.io/inject: "true"
        prometheus.io/scrape: "true"
        prometheus.io/port: "8091"
    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: model-serving
      containers:
        - name: model-serving
          image: atlas/model-serving:latest
          ports:
            - containerPort: 8091
              name: http
          env:
            - name: PORT
              value: "8091"
            - name: MLFLOW_TRACKING_URI
              value: "http://mlflow.atlas-ml:5000"
            - name: MODEL_CACHE_DIR
              value: "/models"
          resources:
            requests:
              cpu: "1"
              memory: 2Gi
            limits:
              cpu: "4"
              memory: 8Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 8091
            initialDelaySeconds: 60
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8091
            initialDelaySeconds: 30
            periodSeconds: 10
          volumeMounts:
            - name: model-cache
              mountPath: /models
      volumes:
        - name: model-cache
          emptyDir:
            sizeLimit: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: model-serving
  namespace: atlas-ml
spec:
  selector:
    app: model-serving
  ports:
    - name: http
      port: 8091
      targetPort: 8091
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: model-serving-hpa
  namespace: atlas-ml
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: model-serving
  minReplicas: 3
  maxReplicas: 15
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: model-serving-pdb
  namespace: atlas-ml
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: model-serving
---
# --- Model Monitoring ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: model-monitoring
  namespace: atlas-ml
  labels:
    app: model-monitoring
    tier: ml
spec:
  replicas: 2
  selector:
    matchLabels:
      app: model-monitoring
  template:
    metadata:
      labels:
        app: model-monitoring
        tier: ml
      annotations:
        sidecar.istio.io/inject: "true"
    spec:
      containers:
        - name: model-monitoring
          image: atlas/model-monitoring:latest
          ports:
            - containerPort: 8092
              name: http
          env:
            - name: PORT
              value: "8092"
            - name: KAFKA_BROKERS
              valueFrom:
                configMapKeyRef:
                  name: atlas-common-config
                  key: KAFKA_BROKERS
            - name: MLFLOW_TRACKING_URI
              value: "http://mlflow.atlas-ml:5000"
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 8092
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8092
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: model-monitoring
  namespace: atlas-ml
spec:
  selector:
    app: model-monitoring
  ports:
    - name: http
      port: 8092
      targetPort: 8092
---
