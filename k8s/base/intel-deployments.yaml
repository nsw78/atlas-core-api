# --- Risk Assessment ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: risk-assessment
  namespace: atlas-intel
  labels:
    app: risk-assessment
    tier: intelligence
spec:
  replicas: 3
  selector:
    matchLabels:
      app: risk-assessment
  template:
    metadata:
      labels:
        app: risk-assessment
        tier: intelligence
      annotations:
        sidecar.istio.io/inject: "true"
        prometheus.io/scrape: "true"
        prometheus.io/port: "8082"
    spec:
      serviceAccountName: risk-assessment
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: risk-assessment
      containers:
        - name: risk-assessment
          image: atlas/risk-assessment:latest
          ports:
            - containerPort: 8082
              name: http
          env:
            - name: PORT
              value: "8082"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: redis-secret
                  key: url
            - name: KAFKA_BROKERS
              valueFrom:
                configMapKeyRef:
                  name: atlas-common-config
                  key: KAFKA_BROKERS
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 8082
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8082
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: risk-assessment
  namespace: atlas-intel
spec:
  selector:
    app: risk-assessment
  ports:
    - name: http
      port: 8082
      targetPort: 8082
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: risk-assessment
  namespace: atlas-intel
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: risk-assessment-hpa
  namespace: atlas-intel
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: risk-assessment
  minReplicas: 3
  maxReplicas: 15
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: risk-assessment-pdb
  namespace: atlas-intel
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: risk-assessment
---
