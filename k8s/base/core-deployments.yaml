# --- Sanctions Screening ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sanctions-screening
  namespace: atlas-core
  labels:
    app: sanctions-screening
    tier: core
spec:
  replicas: 3
  selector:
    matchLabels:
      app: sanctions-screening
  template:
    metadata:
      labels:
        app: sanctions-screening
        tier: core
      annotations:
        sidecar.istio.io/inject: "true"
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
    spec:
      serviceAccountName: sanctions-screening
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: sanctions-screening
      containers:
        - name: sanctions-screening
          image: atlas/sanctions-screening:latest
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: redis-secret
                  key: url
            - name: SYNC_INTERVAL_HOURS
              value: "6"
            - name: KAFKA_BROKERS
              valueFrom:
                configMapKeyRef:
                  name: atlas-common-config
                  key: KAFKA_BROKERS
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
