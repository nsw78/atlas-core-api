apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: atlas-infra
  labels:
    app.kubernetes.io/part-of: atlas
type: Opaque
stringData:
  url: "postgresql://atlas:CHANGE_ME@postgres.atlas-infra:5432/atlas?sslmode=require"
  host: "postgres.atlas-infra"
  port: "5432"
  username: "atlas"
  password: "CHANGE_ME"
  database: "atlas"
---
apiVersion: v1
kind: Secret
metadata:
  name: redis-secret
  namespace: atlas-infra
  labels:
    app.kubernetes.io/part-of: atlas
type: Opaque
stringData:
  url: "redis://:CHANGE_ME@redis.atlas-infra:6379/0"
  host: "redis.atlas-infra"
  port: "6379"
  password: "CHANGE_ME"
---
apiVersion: v1
kind: Secret
metadata:
  name: jwt-secret
  namespace: atlas-core
  labels:
    app.kubernetes.io/part-of: atlas
type: Opaque
stringData:
  secret: "CHANGE_ME_USE_VAULT_IN_PRODUCTION"
---
apiVersion: v1
kind: Secret
metadata:
  name: kafka-secret
  namespace: atlas-infra
  labels:
    app.kubernetes.io/part-of: atlas
type: Opaque
stringData:
  brokers: "kafka.atlas-infra:9092"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: atlas-common-config
  namespace: atlas-core
  labels:
    app.kubernetes.io/part-of: atlas
data:
  LOG_LEVEL: "info"
  ENVIRONMENT: "production"
  METRICS_ENABLED: "true"
  TRACING_ENABLED: "true"
  TRACING_ENDPOINT: "http://jaeger.atlas-monitoring:14268/api/traces"
  KAFKA_BROKERS: "kafka.atlas-infra:9092"
  REDIS_URL: "redis://redis.atlas-infra:6379/0"
  DATABASE_HOST: "postgres.atlas-infra"
  DATABASE_PORT: "5432"
  DATABASE_NAME: "atlas"
